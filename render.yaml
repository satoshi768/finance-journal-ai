services:
  - type: web
    name: finance-journal-ai
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from app import init_db; init_db()"
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-journal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: finance-journal-db
    plan: free
